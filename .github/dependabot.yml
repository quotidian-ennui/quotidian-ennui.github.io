version: 2

updates:
  - package-ecosystem: "bundler"
    directory: "/"
    open-pull-requests-limit: 20
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:10"
      timezone: "Europe/London"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(bundler): "
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 20
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:15"
      timezone: "Europe/London"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(actions): "
