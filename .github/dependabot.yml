version: 2

updates:
  - package-ecosystem: "bundler"
    directory: "/"
    open-pull-requests-limit: 20
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:10"
      timezone: "Europe/London"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(bundler): "
    cooldown:
      default-days: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(actions): "
    open-pull-requests-limit: 20
    schedule:
      interval: "daily"
      time: "05:13"
      timezone: Europe/London
    rebase-strategy: disabled
    cooldown:
      default-days: 3
      exclude:
        - "quotidian-ennui/workflows-olio/*"
        - "quotidian-ennui/actions-olio/*"
    groups:
      workflows-olio:
        patterns:
          - "quotidian-ennui/workflows-olio/*"
          - "quotidian-ennui/actions-olio/*"
