name: dependabot-merge

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  dependabot-merge:
    permissions:
      contents: write
      pull-requests: write
    if: |
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Find associated PR
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
        id: findpr
        with:
          github-token: ${{ github.token }}
          state: open
          sha: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}
      - name: merge-if-built
        continue-on-error: true
        uses: fastify/github-action-merge-dependabot@4ed43935e3bd362966dfb1e0829f9a35638fe6eb # v3.13.0
        with:
          pr-number: ${{ steps.findpr.outputs.pr }}
          target: minor
